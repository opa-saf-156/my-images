        .option-item.selected {
            background: #d4c1ab; border: 2px solid #6f5238;
            box-shadow: 0 4px 0 #7a5f40, 0 2px 8px rgba(0,0,0,0.05);

        .nav-buttons {
            display: flex; justify-content: space-between; align-items: center;
            margin: 18px 0 8px;
        }
        .nav-btn {
            background: #e1d3c3; border: 1px solid #b7a38e; color: #3a2c1e;
            font-weight: 600; font-size: 1rem; padding: 10px 22px; border-radius: 40px;

        .nav-btn:disabled {

            </div>

        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" disabled>← 上一题</button>

        <div style="display: flex; justify-content: center; margin-top: 8px;">
            <button class="nav-btn reset-btn" id="resetBtn">⟲ 重新开始</button>
        </div>
    </div>
    <div id="resultPanel" class="result-card hidden">

            <div>

        <div class="thought-box" id="resultThought"></div>

        <div class="keywords" id="resultKeywords"></div>
        <div class="footnote">----- 你的哲思镜像，唯一重合 -----</div>
        <div class="image-note" id="imagePathNote"></div>
        <div style="margin-top: 24px; text-align: center;">
            <button class="nav-btn reset-btn" id="resetFromResultBtn">⟲ 重新探索</button>
        </div>
    </div>
    <div id="warningMsg" class="warning-msg"></div>
</div>

        { q: "你对“变化”与“永恒”的深层直觉是？", options: [

            { text: "对此持不可知或怀疑态度，更关注现世的生活与人类事务。", weights: {19:2,7:2} }
        ]},
        { q: "你更向往或欣赏哪种生活方式？", options: [

            { text: "宁静的生活：远离政治纷扰，在友谊与简单快乐中求得内心安宁。", weights: {7:4,33:2} },
            { text: "行动的生活：积极介入世界，通过实践创造意义、改造社会。", weights: {28:3,25:2,38:2} },
            { text: "审美的生活：在艺术创造与鉴赏中超越日常痛苦，找到救赎。", weights: {23:3,24:2} },
            { text: "日常的生活：深入描述和理解日常语言与普通的生活形式。", weights: {29:3} },
            { text: "修身的生活：在伦常日用中不断砥砺品德，达到内在与外在的和谐。", weights: {31:3,34:2} }
        ]},
        { q: "如何看待逻辑、语言与思想/世界的关系？", options: [
            { text: "逻辑是哲学的锋利工具，应坚持简洁经济的原则，剔除不必要的假设。", weights: {13:4,6:1} },
            { text: "语言并非工具，而是人栖息之所，是存在得以显现的场所。", weights: {27:3} },
            { text: "哲学问题的产生源于对语言的误解，澄清语言就能消解这些问题。", weights: {29:4} },
            { text: "语言与名称必须符合实在与规范，正名是秩序的基础。", weights: {31:2,35:2} },
            { text: "语言本身是权力运作的场域，它塑造了我们认知世界的可能。", weights: {30:4} },
            { text: "逻辑结构反映了世界的结构，语言是描述事实的逻辑图像。", weights: {29:2,14:2} }
        ]},
        { q: "你如何看待“欲望”在人生中的角色？", options: [
            { text: "欲望是生命痛苦的根本源泉，真正的幸福在于克制乃至消除欲望。", weights: {23:4,8:2} },
            { text: "欲望是生命的本质动力，应被肯定和释放，而不是压抑。", weights: {24:4} },
            { text: "自然的、必要的欲望可以满足，但应避免虚浮的欲望，追求中道。", weights: {6:3,31:2} },
            { text: "欲望是权力意志的表现，是创造与超越的驱动力量。", weights: {24:3} },
            { text: "关键在于觉察欲望的源头（良知），导其向善，而非简单灭除。", weights: {38:3,34:1} },
            { text: "欲望是社会构建的产物，对其分析应置于具体的历史文化中。", weights: {30:2} }
        ]},
        { q: "你如何理解“历史”的本质与动力？", options: [
            { text: "历史是某种绝对精神或理性逐步自我实现、走向自由的过程。", weights: {22:4} },
            { text: "历史从根本上说是物质生产与阶级斗争的历史。", weights: {25:4} },
            { text: "历史是循环的，文明兴衰、观念往复，没有真正的进步。", weights: {2:2,24:2} },
            { text: "历史是充满断裂、偶然的权力斗争史，而非连续的进步叙事。", weights: {30:4} },
            { text: "历史是伟人或“超人”意志的体现，他们为时代赋予价值。", weights: {24:3} },
            { text: "历史是各种文化、观念和生活方式竞争与交融的场域。", weights: {19:2,10:2} }
        ]},
        { q: "你认为获取可靠知识或智慧最根本的途径是？", options: [
            { text: "对话与辩证：通过不断诘问、反驳和检验，逼近真理。", weights: {4:4,22:2} },
            { text: "怀疑与奠基：从普遍怀疑出发，找到一个无可置疑的基点进行演绎。", weights: {14:4} },
            { text: "经验与归纳：从大量具体观察中总结规律，尽管无法获得绝对必然性。", weights: {19:4} },
            { text: "直觉与洞察：直接把握事物的本质，回到现象本身进行描述。", weights: {27:2} },
            { text: "实践与体认：在具体的道德和实践活动中领会真理，知行合一。", weights: {38:3} },
            { text: "逻辑与演算：通过符号逻辑和数学般的严密推理构建知识体系。", weights: {16:3,29:2} }
        ]},
        { q: "以下哪种内心独白最符合你的气质？", options: [
            { text: "我最大的智慧，就是知道自己一无所知。认识自己是一生的功课。", weights: {4:4} },
            { text: "给我一个坚实支点，我能用理性厘清整个世界。我相信思维的力量。", weights: {14:3} },
            { text: "成为你自己！不要追随时代或他人，要释放你内在的生命力。", weights: {24:4} },
            { text: "你一无所有，除了自由。你必须选择，并为此承担全部重负。", weights: {28:4} },
            { text: "天地万物与我本为一体，何须外求？内在的超越即是永恒。", weights: {33:4} },
            { text: "世界并非等待你去理解，而是等待你去改变。行动高于沉思。", weights: {25:3,28:2} }
        ]}
    ];

    const totalQ = questions.length;
    let currentIndex = 0;
    let answers = new Array(totalQ).fill(null);
    const quizSection = document.getElementById('quizSection');
    const resultPanel = document.getElementById('resultPanel');
    const qNumDisplay = document.getElementById('qNumDisplay');
    const qText = document.getElementById('qText');
    const optionsDiv = document.getElementById('optionsContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const resetFromResult = document.getElementById('resetFromResultBtn');
    const progressCurrent = document.getElementById('progressCurrent');
    const progressTotal = document.getElementById('progressTotal');
    const progressBarFill = document.getElementById('progressBarFill');
    const warningMsg = document.getElementById('warningMsg');
    const avatarContainer = document.getElementById('avatarContainer');
    const imagePathNote = document.getElementById('imagePathNote');
    const letters = ['A','B','C','D','E','F'];

    function renderQuestion(index) {
        const qData = questions[index];
        qNumDisplay.textContent = index + 1;
        qText.textContent = qData.q;
        let html = '';
        qData.options.forEach((opt, optIdx) => {
            const isSelected = (answers[index] === optIdx);
            html += `<div class="option-item ${isSelected ? 'selected' : ''}" data-opt-index="${optIdx}">`;
            html += `<span class="option-letter">${letters[optIdx]}.</span>`;
            html += `<span class="option-text">${opt.text}</span>`;
            html += `</div>`;
        });
        optionsDiv.innerHTML = html;
        document.querySelectorAll('.option-item').forEach(el => {
            el.addEventListener('click', () => {
                const optIdx = parseInt(el.dataset.optIndex);
                answers[index] = optIdx;
                document.querySelectorAll('.option-item').forEach(oe => oe.classList.remove('selected'));
                el.classList.add('selected');
                updateNavButtons();
            });
        });
        progressCurrent.textContent = `第${index+1}题`;
        progressTotal.textContent = `/ ${totalQ}`;
        progressBarFill.style.width = ((index+1)/totalQ*100) + '%';
        updateNavButtons();
    }

    function updateNavButtons() {
        prevBtn.disabled = (currentIndex === 0);
        nextBtn.textContent = (currentIndex === totalQ - 1) ? '完成 · 查看结果' : '下一题 →';
    }

    function allQuestionsAnswered() {
        return answers.every(a => a !== null);
    }

    function computeAndShowResult() {
        if (!allQuestionsAnswered()) {
            warningMsg.textContent = '⚠️ 您还有题目未作答，请完成全部15题。';
            return false;
        }
        warningMsg.textContent = '';
        const scores = new Array(PHILOSOPHERS.length+1).fill(0);
        for (let i=0; i<totalQ; i++) {
            const optIdx = answers[i];
            const weights = questions[i].options[optIdx].weights;
            for (let [phId, w] of Object.entries(weights)) {
                scores[parseInt(phId)] += w;
            }
        }
        let maxScore = -1, bestId = 1;
        for (let id=1; id<=PHILOSOPHERS.length; id++) {
            if (scores[id] > maxScore) { maxScore = scores[id]; bestId = id; }
        }
        const p = PHILOSOPHERS.find(x => x.id === bestId);
        document.getElementById('resultName').innerText = p.name;
        document.getElementById('resultEra').innerText = p.era;
        document.getElementById('resultSchool').innerText = p.school;
        document.getElementById('resultWorks').innerText = p.works;
        document.getElementById('resultThought').innerHTML = `“${p.thought}”`;
        document.getElementById('resultQuote').innerText = `“${p.quote}”`;
        document.getElementById('richDescription').innerText = p.richDesc;
        const kwDiv = document.getElementById('resultKeywords');
        kwDiv.innerHTML = p.keywords.map(k => `<span class="keyword">${k}</span>`).join('');
        const imgPath = IMAGE_PATHS[bestId];
        avatarContainer.innerHTML = '';
        if (imgPath && imgPath.trim() !== '') {
            const img = new Image();
            img.className = 'philo-avatar';
            img.referrerPolicy = "no-referrer";
            img.src = imgPath;
            img.alt = p.name;
            img.onload = () => {
                avatarContainer.innerHTML = '';
                avatarContainer.appendChild(img);
                imagePathNote.textContent = `📷 ${p.name}`;
            };
            img.onerror = () => {
                avatarContainer.innerHTML = `<div class="avatar-placeholder">${p.name.charAt(0)}</div>`;
                imagePathNote.textContent = `⚠️ 图片加载失败，请检查路径：${imgPath}`;
            };
            avatarContainer.appendChild(img);
            imagePathNote.textContent = `⏳ 加载中...`;
        } else {
            avatarContainer.innerHTML = `<div class="avatar-placeholder">${p.name.charAt(0)}</div>`;
            imagePathNote.textContent = `📌 未配置图片路径。`;
        }
        quizSection.classList.add('hidden');
        resultPanel.classList.remove('hidden');
        return true;
    }

    function resetQuiz() {
        currentIndex = 0;
        answers = new Array(totalQ).fill(null);
        quizSection.classList.remove('hidden');
        resultPanel.classList.add('hidden');
        warningMsg.textContent = '';
        renderQuestion(0);
    }

    prevBtn.addEventListener('click', () => {
        if (currentIndex > 0) { currentIndex--; renderQuestion(currentIndex); }
    });
    nextBtn.addEventListener('click', () => {
        if (answers[currentIndex] === null) { warningMsg.textContent = '请先选择一个选项'; return; }
        warningMsg.textContent = '';
        if (currentIndex === totalQ - 1) { computeAndShowResult(); }
        else { currentIndex++; renderQuestion(currentIndex); }
    });
    resetBtn.addEventListener('click', resetQuiz);
    resetFromResult.addEventListener('click', resetQuiz);
    renderQuestion(0);
})();
</script>
